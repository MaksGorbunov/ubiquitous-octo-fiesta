<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список автомобилей</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .container {
            text-align: center;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Список автомобилей</h1>

    <p th:if="${requestedCount != null}">
        Запрошено машин: <span th:text="${requestedCount}"></span>
    </p>

    <table th:if="${not #lists.isEmpty(cars)}">
        <thead>
        <tr>
            <th>Марка (Name)</th>
            <th>Модель (Model)</th>
            <th>Цвет (Color)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="car : ${cars}">
            <td th:text="${car.name}"></td>
            <td th:text="${car.model}"></td>
            <td th:text="${car.color}"></td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(cars)}" style="color: red;">
        Нет машин для отображения
    </p>
</div>
</body>
</html>
